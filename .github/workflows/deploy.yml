name: Deploy to biks-droplet

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy SBSR WhatsApp Bridge

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 206.189.34.228 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh root@206.189.34.228 << 'EOF'
            set -e
            echo "🚀 Deploying wa-bridge-sbsr..."

            cd /docker/wa-webhook-sbsr

            # Stash local changes (backup files, etc)
            git stash --include-untracked 2>/dev/null || true

            # Pull latest
            echo "📥 Pulling latest from GitHub..."
            git pull origin master

            # Install deps if package.json changed
            echo "📦 Checking dependencies..."
            npm install --production 2>/dev/null || true

            # Validate syntax
            echo "🔍 Checking syntax..."
            node --check server.js || echo "⚠️ server.js syntax check skipped"
            node --check admin.js || echo "⚠️ admin.js syntax check skipped"

            # Restart PM2
            echo "🔄 Restarting PM2 process..."
            pm2 restart wa-bridge-sbsr --update-env

            echo "✅ Deploy complete!"
          EOF

      - name: Health check
        run: |
          sleep 3
          curl -s https://production.biks.ai/admin/api/stats | head -5
          echo ""
          echo "✅ Health check passed"
